[server]
host = "0.0.0.0"
port = 11116
auth_token = ""        # optional; if set, validate Bearer header

[models]
default = "first"     # if first/last, uses first/last model in list. if explicit model name uses that

[inference]
max_seq_len = 8192          #KV cache size in tokens (default: 8192)
log_thinking = false        # log <think>...</think> content to stderr (spammy; enable for diagnostics)
enable_thinking_default = true   # default thinking mode; overridable per-request via enable_thinking
elide_thinking_default = true            # strip <think>...</think> from output (default: true)
single_resident_model = true             # true (default) = evict previous model on switch; false = keep all loaded in RAM
max_request_seq_len = 16384              # hard limit on request context + max_tokens (0 = disabled)
strict_mode = true                       # true = reject requests that exceed max_request_seq_len; false = warn only
flash_attention = false                  # use Flash Attention 2 when head geometry allows (Metal FA2 supported dims); overridable per-request
                                         # NOTE: can be *slower* on the wrong hardware. M3Max is such a machine.
