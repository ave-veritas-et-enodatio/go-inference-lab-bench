    <text x="62" y="32" text-anchor="middle" font-size="9" fill="#666">k / v [f32]</text>
  </g>
</g>
  </g>
  <g id="block_moe">
<g>
  <rect width="660" height="200" rx="6" fill="url(#ffnGrad)" stroke="#e65100" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="330" y="20" text-anchor="middle" font-weight="700" font-size="13" fill="#bf360c">Unified MoE FFN</text>
  <g transform="translate(15, 35)">
    <rect width="120" height="56" rx="4" fill="#fff" stroke="#ff9800" stroke-width="0.8" opacity="0.9"/>
    <text x="60" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Router</text>
    <text x="60" y="31" text-anchor="middle" font-size="9" fill="#777">gate_inp</text>
    <text x="60" y="43" text-anchor="middle" font-size="9" fill="#777">softmax -> top-k</text>
  </g>
  <g transform="translate(150, 35)">
