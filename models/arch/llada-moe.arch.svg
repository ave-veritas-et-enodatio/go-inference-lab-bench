    <text x="70" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Aggregate</text>
    <text x="70" y="31" text-anchor="middle" font-size="9" fill="#777">weight * expert_out</text>
    <text x="70" y="43" text-anchor="middle" font-size="9" fill="#777">sum across experts</text>
  </g>
  <g transform="translate(15, 110)">
