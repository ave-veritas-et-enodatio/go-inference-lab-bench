    <text x="255" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Shared Expert (optional)</text>
    <text x="255" y="31" text-anchor="middle" font-size="9" fill="#777">Qwen: SwiGLU + sigmoid gate | Gemma4: plain FFN (same activation)</text>
  </g>
  <g transform="translate(545, 35)">
