<!-- bbox: 580x200 -->
<!-- color: #2e7d32 (green) -->
<g>
  <rect width="580" height="200" rx="6" fill="url(#recurrent)" stroke="#2e7d32" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="290" y="20" text-anchor="middle" font-weight="700" font-size="13" fill="#1b5e20">Gated Delta-Net</text>

  <g transform="translate(15, 35)">
    <rect width="160" height="56" rx="4" fill="#fff" stroke="#66bb6a" stroke-width="0.8" opacity="0.9"/>
    <text x="80" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">QKV Projection</text>
    <text x="80" y="32" text-anchor="middle" font-size="9" fill="#777">attn_qkv.weight</text>
    <text x="80" y="44" text-anchor="middle" font-size="9" fill="#777">+ attn_gate.weight (Z)</text>
  </g>
  <g transform="translate(195, 35)">
    <rect width="120" height="56" rx="4" fill="#fff" stroke="#66bb6a" stroke-width="0.8" opacity="0.9"/>
    <text x="60" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">Conv1D</text>
    <text x="60" y="32" text-anchor="middle" font-size="9" fill="#777">ssm_conv1d.weight</text>
    <text x="60" y="44" text-anchor="middle" font-size="9" fill="#777">silu activation</text>
  </g>
  <g transform="translate(335, 35)">
    <rect width="120" height="56" rx="4" fill="#fff" stroke="#66bb6a" stroke-width="0.8" opacity="0.9"/>
    <text x="60" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">L2 Norm Q/K</text>
    <text x="60" y="32" text-anchor="middle" font-size="9" fill="#777">eps=rms_eps</text>
    <text x="60" y="44" text-anchor="middle" font-size="9" fill="#777">normalize per head</text>
  </g>

  <g transform="translate(15, 105)">
    <rect width="220" height="44" rx="4" fill="#fff" stroke="#66bb6a" stroke-width="0.8" opacity="0.9"/>
    <text x="110" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">Fused Gated Delta-Net</text>
    <text x="110" y="31" text-anchor="middle" font-size="9" fill="#777">ssm_a / ssm_alpha / ssm_beta / ssm_dt.bias</text>
  </g>
  <g transform="translate(250, 105)">
    <rect width="130" height="44" rx="4" fill="url(#norm)" stroke="#7b1fa2" stroke-width="0.8" opacity="0.9"/>
    <text x="65" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#6a1b9a">RMSNorm</text>
    <text x="65" y="31" text-anchor="middle" font-size="9" fill="#777">ssm_norm.weight</text>
  </g>
  <g transform="translate(395, 105)">
    <rect width="170" height="44" rx="4" fill="#fff" stroke="#66bb6a" stroke-width="0.8" opacity="0.9"/>
    <text x="85" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">Gated Output</text>
    <text x="85" y="31" text-anchor="middle" font-size="9" fill="#777">norm(x) * silu(z) -> ssm_out</text>
  </g>

  <g transform="translate(475, 35)">
    <rect width="90" height="56" rx="4" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="45" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#388e3c">Cache</text>
    <text x="45" y="32" text-anchor="middle" font-size="9" fill="#666">conv_state</text>
    <text x="45" y="44" text-anchor="middle" font-size="9" fill="#666">ssm_state</text>
  </g>
</g>
