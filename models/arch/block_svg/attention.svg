<!-- bbox: 580x200 -->
<!-- color: #1565c0 (blue) -->
<g>
  <rect width="580" height="200" rx="6" fill="url(#full_attention)" stroke="#1565c0" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="290" y="20" text-anchor="middle" font-weight="700" font-size="13" fill="#0d47a1">Attention</text>

  <g transform="translate(15, 35)">
    <rect width="160" height="56" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="0.8" opacity="0.9"/>
    <text x="80" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Q / K / V Projections</text>
    <text x="80" y="31" text-anchor="middle" font-size="9" fill="#777">attn_q / attn_k / attn_v</text>
    <text x="80" y="43" text-anchor="middle" font-size="9" fill="#777">GQA: n_heads / n_kv_heads</text>
  </g>
  <g transform="translate(195, 35)">
    <rect width="160" height="56" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="0.8" opacity="0.9"/>
    <text x="80" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">RoPE</text>
    <text x="80" y="31" text-anchor="middle" font-size="9" fill="#777">standard rope_ext</text>
    <text x="80" y="43" text-anchor="middle" font-size="9" fill="#777">applied to Q and K</text>
  </g>

  <g transform="translate(15, 105)">
    <rect width="300" height="44" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="0.8" opacity="0.9"/>
    <text x="150" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Scaled Dot-Product Attention</text>
    <text x="150" y="31" text-anchor="middle" font-size="9" fill="#777">softmax(Q @ K / sqrt(d)) @ V</text>
  </g>
  <g transform="translate(335, 105)">
    <rect width="130" height="44" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="0.8" opacity="0.9"/>
    <text x="65" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Output Proj</text>
    <text x="65" y="31" text-anchor="middle" font-size="9" fill="#777">attn_output.weight</text>
  </g>

  <g transform="translate(375, 35)">
    <rect width="125" height="56" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="62" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#1976d2">KV Cache</text>
    <text x="62" y="32" text-anchor="middle" font-size="9" fill="#666">k / v [f32]</text>
  </g>
</g>
