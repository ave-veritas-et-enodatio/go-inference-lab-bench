<!-- bbox: 440x120 -->
<!-- color: #e65100 (orange) -->
<g>
  <rect width="440" height="120" rx="6" fill="url(#ffn)" stroke="#e65100" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="220" y="20" text-anchor="middle" font-weight="700" font-size="13" fill="#bf360c">GeGLU FFN</text>

  <g transform="translate(15, 35)">
    <rect width="120" height="36" rx="4" fill="#fff" stroke="#ff9800" stroke-width="0.8" opacity="0.9"/>
    <text x="60" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Gate + Up</text>
    <text x="60" y="27" text-anchor="middle" font-size="9" fill="#777">ffn_gate / ffn_up</text>
  </g>
  <g transform="translate(150, 35)">
    <rect width="120" height="36" rx="4" fill="#fff" stroke="#ff9800" stroke-width="0.8" opacity="0.9"/>
    <text x="60" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">GELU + Mul</text>
    <text x="60" y="27" text-anchor="middle" font-size="9" fill="#777">gelu(gate) * up</text>
  </g>
  <g transform="translate(285, 35)">
    <rect width="140" height="36" rx="4" fill="#fff" stroke="#ff9800" stroke-width="0.8" opacity="0.9"/>
    <text x="70" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#e65100">Down Proj</text>
    <text x="70" y="27" text-anchor="middle" font-size="9" fill="#777">ffn_down.weight</text>
  </g>

  <text x="220" y="96" text-anchor="middle" font-size="10" fill="#777">pre-FFN: ffn_norm (RMSNorm) / post-FFN: post_ffw_norm (RMSNorm)</text>
</g>
