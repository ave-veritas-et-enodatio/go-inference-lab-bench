# DeepSeek V2 / GLM-4 architecture definition.
#
# Multi-head Latent Attention (MLA) with low-rank Q/KV compression.
# Hybrid FFN: first N layers use dense SwiGLU, remaining use MoE.
# Q-nope absorption trick: non-positional Q dims absorbed into KV latent space.
# KV cache stores only compressed K (no separate V cache — V derived from K).
#
# Used by: GLM-4.7-Flash, DeepSeek V2/V3 variants

[architecture]
name = "deepseek2"
tied_embeddings = false

[params]
n_layers            = "deepseek2.block_count"
n_heads             = "deepseek2.attention.head_count"
n_kv_heads          = "deepseek2.attention.head_count_kv"
n_embd              = "deepseek2.embedding_length"
n_ff                = "deepseek2.feed_forward_length"
rms_eps             = "deepseek2.attention.layer_norm_rms_epsilon"
rope_n_rot          = "deepseek2.rope.dimension_count"
rope_freq_base      = "deepseek2.rope.freq_base"
rope_mode           = "standard"
kv_lora_rank        = "deepseek2.attention.kv_lora_rank"
q_lora_rank         = "deepseek2.attention.q_lora_rank"
head_k_dim_mla      = "deepseek2.attention.key_length_mla"
head_v_dim_mla      = "deepseek2.attention.value_length_mla"
head_dim             = "deepseek2.attention.key_length"
n_expert             = "deepseek2.expert_count"
n_expert_used        = "deepseek2.expert_used_count"
leading_dense_count  = "deepseek2.leading_dense_block_count"
n_ff_exp             = "deepseek2.expert_feed_forward_length"
expert_weights_scale = "deepseek2.expert_weights_scale?"

[params.derived]
n_vocab = "token_embd.ne[1]"

[params.defaults]
n_kv_heads = "n_heads"

[weights.global]
token_embd  = "token_embd.weight"
output_norm = "output_norm.weight"
output      = "output.weight"

[layers]
count  = "n_layers"
prefix = "blk.@{layer_idx}."

[layers.routing]
# All layers use the same attention block (MLA); only FFN differs per layer
rule     = "1 == 1"
if_true  = "mla"
if_false = "mla"

[layers.common_weights]
attn_norm = "attn_norm.weight"
ffn_norm  = "ffn_norm.weight"

# --- MLA Attention (all layers) ---

[blocks.mla]
builder = "mla_attention"

  [blocks.mla.weights]
  attn_q_a       = "attn_q_a.weight"
  attn_q_a_norm  = "attn_q_a_norm.weight"
  attn_q_b       = "attn_q_b.weight"
  attn_kv_a_mqa  = "attn_kv_a_mqa.weight"
  attn_kv_a_norm = "attn_kv_a_norm.weight"
  attn_k_b       = "attn_k_b.weight"
  attn_v_b       = "attn_v_b.weight"
  attn_output    = "attn_output.weight"

  [blocks.mla.cache]
  # K cache only: compressed KV + RoPE dims, MQA (1 head). V derived from K.
  k = { dims = ["kv_lora_rank + rope_n_rot", "max_seq_len", "1"], dtype = "f32" }

# --- Dense SwiGLU FFN (first N layers) ---

[ffn]
builder = "swiglu"

  [ffn.weights]
  gate = "ffn_gate.weight"
  up   = "ffn_up.weight"
  down = "ffn_down.weight"

# --- MoE FFN (remaining layers) ---

[ffn_alt]
builder = "moe"

  [ffn_alt.weights]
  gate_inp   = "ffn_gate_inp.weight"
  gate_exps  = "ffn_gate_exps.weight"
  up_exps    = "ffn_up_exps.weight"
  down_exps  = "ffn_down_exps.weight"
  gate_shexp = "ffn_gate_shexp.weight"
  up_shexp   = "ffn_up_shexp.weight"
  down_shexp = "ffn_down_shexp.weight"
  exp_probs_b = "exp_probs_b.bias"

[tokens]
think_open  = "<think>"
think_close = "</think>"
