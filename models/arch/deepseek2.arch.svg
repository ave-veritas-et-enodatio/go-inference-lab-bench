    <text x="298" y="12" font-size="11" fill="#555555">swiglu</text>
  </g>
  <text x="480" y="78" text-anchor="middle" font-size="9" fill="#999999" font-family="monospace">@{name} = engine builtin, ${name} = GGUF-resolved param</text>
  <g transform="translate(330, 110)">
