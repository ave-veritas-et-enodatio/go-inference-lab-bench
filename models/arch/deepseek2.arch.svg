<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 997" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555555"/>
    </marker>
    <linearGradient id="ssmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/><stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="attnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/><stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="ffnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/><stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="normGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/><stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
    <linearGradient id="globalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/><stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  <!-- Block definitions -->
  <g id="block_mla_attention">
<g>
  <rect width="660" height="250" rx="6" fill="url(#attnGrad)" stroke="#1565c0" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="330" y="20" text-anchor="middle" font-weight="700" font-size="13" fill="#0d47a1">Multi-head Latent Attention (MLA)</text>
  <g transform="translate(15, 35)">
    <rect width="150" height="56" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="0.8" opacity="0.9"/>
    <text x="75" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Q Low-Rank</text>
    <text x="75" y="31" text-anchor="middle" font-size="9" fill="#777">q_a -> norm -> q_b</text>
    <text x="75" y="43" text-anchor="middle" font-size="9" fill="#777">split: nope + pe</text>
  </g>
  <g transform="translate(180, 35)">
    <rect width="150" height="56" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="0.8" opacity="0.9"/>
    <text x="75" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">KV Compression</text>
    <text x="75" y="31" text-anchor="middle" font-size="9" fill="#777">kv_a_mqa -> norm</text>
    <text x="75" y="43" text-anchor="middle" font-size="9" fill="#777">split: compressed + pe</text>
  </g>
  <g transform="translate(345, 35)">
    <rect width="150" height="56" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="0.8" opacity="0.9"/>
    <text x="75" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Q Absorption</text>
    <text x="75" y="31" text-anchor="middle" font-size="9" fill="#777">q_nope @ k_b.T</text>
    <text x="75" y="43" text-anchor="middle" font-size="9" fill="#777">+ RoPE on pe dims</text>
  </g>
  <g transform="translate(15, 105)">
    <rect width="300" height="44" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="0.8" opacity="0.9"/>
    <text x="150" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">MQA Attention</text>
    <text x="150" y="31" text-anchor="middle" font-size="9" fill="#777">1 KV head, n_heads Q heads (GQA broadcast)</text>
  </g>
  <g transform="translate(335, 105)">
    <rect width="160" height="44" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="0.8" opacity="0.9"/>
    <text x="80" y="17" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">V Decompress</text>
    <text x="80" y="31" text-anchor="middle" font-size="9" fill="#777">v_b per-head expansion</text>
  </g>
  <g transform="translate(15, 163)">
    <rect width="260" height="36" rx="4" fill="#fff" stroke="#64b5f6" stroke-width="0.8" opacity="0.9"/>
    <text x="130" y="15" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">Output Projection</text>
    <text x="130" y="28" text-anchor="middle" font-size="9" fill="#777">attn_output.weight</text>
  </g>
  <g transform="translate(510, 35)">
    <rect width="135" height="56" rx="4" fill="#e3f2fd" stroke="#90caf9" stroke-width="0.8" stroke-dasharray="3,2"/>
    <text x="67" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#1976d2">K Cache Only</text>
    <text x="67" y="32" text-anchor="middle" font-size="9" fill="#666">compressed + rope</text>
    <text x="67" y="44" text-anchor="middle" font-size="9" fill="#666">V derived from K</text>
  </g>
</g>
  </g>
  <g id="block_swiglu">
<g>
  <rect width="440" height="50" rx="6" fill="url(#ffnGrad)" stroke="#e65100" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="220" y="19" text-anchor="middle" font-weight="700" font-size="13" fill="#bf360c">SwiGLU FFN</text>
  <text x="220" y="35" text-anchor="middle" font-size="10" fill="#777">silu(gate * x) * up * x -> down</text>
</g>
  </g>
  </defs>

  <rect width="960" height="997" fill="#fafafa" rx="8"/>

  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#333333">Deepseek2 Architecture</text>
